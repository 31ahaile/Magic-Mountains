<!DOCTYPE html>
<html>
<head>
  <title>Map Test</title>

 
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
    }

    h1 {
      margin: 15px;
    }

    #map {
      height: 500px;
      width: 90%;
      margin: auto;
      border-radius: 10px;
    }
  </style>

  <meta name="referrer" content="origin" />

</head>

<body>

<h1>Travel Map Test</h1>

<div id="map"></div>


<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script>

  const map = L.map('map').setView([30, -20], 2);

 
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 18,
  }).addTo(map);

 
  const places = [
    {
      name: "Grand Teton",
      coords: [43.7904, -110.6818]
    },
    {
      name: "Tuscany",
      coords: [43.3407, 11.0439]
    },
    {
      name: "Liberia (Costa Rica)",
      coords: [10.6346, -85.4407]
    },
    {
      name: "Lake Tahoe",
      coords: [39.0968, -120.0324]
    },
    {
      name: "Kiawah Island (South Carolina)",
      coords: [32.6082, -80.0848]
    },
    {
      name: "Snoqualmie (Washington)",
      coords: [47.5287, -121.8250]
    }
  ];

  
  places.forEach(place => {
    L.marker(place.coords)
      .addTo(map)
      .bindPopup(place.name);
  });

</script>

</body>
</html>
